      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#080c10" />
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4" />
  <!-- TV Body -->
